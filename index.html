<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenView | Professional Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --secondary: #818cf8;
            --text: #f1f5f9;
            --green: #4ade80;
            --pink: #fb7185;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 600;
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0 28px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        .stats {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }

        #token-display {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 20px;
        }

        .token-box {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 6px;
            color: #000;
            cursor: default;
            transition: transform 0.2s ease;
            position: relative;
        }

        .token-box:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        /* Logic Styles */
        .token-word { background-color: var(--green); }
        .token-punct { background-color: var(--pink); }

        .tooltip {
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 10px;
            white-space: nowrap;
            display: none;
            pointer-events: none;
        }

        .token-box:hover .tooltip {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Token Analyzer</h1>
    <p class="description">
        Tokens are the atomic units of LLMs. In English, 1,000 tokens is roughly 750 words. 
        Input your text below to see how a machine perceives your language.
    </p>

    <div class="input-group">
        <input type="text" id="input-text" placeholder="Type a sentence (try: The quick brown dog!)">
        <button id="analyze-btn">Analyze</button>
    </div>

    <div class="stats" id="stats-area" style="display: none;">
        <h3 id="token-count-text">Estimated Tokens: 0</h3>
        <div id="token-display"></div>
    </div>
</div>

<script>
    const inputText = document.getElementById('input-text');
    const analyzeBtn = document.getElementById('analyze-btn');
    const statsArea = document.getElementById('stats-area');
    const tokenDisplay = document.getElementById('token-display');
    const tokenCountText = document.getElementById('token-count-text');

    // Related concepts mapping
    const relationships = {
        "dog": "Animal / Pet",
        "cat": "Animal / Pet",
        "horse": "Animal / Equine",
        "hello": "Greeting",
        "ai": "Artificial Intelligence"
    };

    function analyzeText() {
        const text = inputText.value.trim();
        if (!text) return;

        // Reset and Show
        statsArea.style.display = 'block';
        tokenDisplay.innerHTML = '';

        // Improved Regex: captures words or individual punctuation marks
        const tokens = text.match(/\w+|[^\w\s]/g) || [];
        
        // In LLMs, tokens aren't always words (approx 4 chars/token)
        // We'll show the actual count of fragments for visual clarity
        tokenCountText.innerText = `Total Tokens: ${tokens.length}`;

        tokens.forEach(token => {
            const span = document.createElement('div');
            const isPunct = /^[^\w\s]$/.test(token);
            
            span.className = `token-box ${isPunct ? 'token-punct' : 'token-word'}`;
            span.innerText = token;

            // Add Tooltip for relationships
            const cleanToken = token.toLowerCase();
            if (relationships[cleanToken]) {
                const tooltip = document.createElement('div');
                tooltip.className = 'tooltip';
                tooltip.innerText = `Related: ${relationships[cleanToken]}`;
                span.appendChild(tooltip);
            }

            tokenDisplay.appendChild(span);
        });
    }

    analyzeBtn.addEventListener('click', analyzeText);
    
    // Allow "Enter" key to trigger analysis
    inputText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') analyzeText();
    });
</script>

</body>
</html>
